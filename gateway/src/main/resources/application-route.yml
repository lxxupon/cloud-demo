            - id: seata-product-route
              uri: lb://seata-product-service
              predicates:
                - name: Path
                  args:
                    pattern: /api/product/**
                    matchTrailingSlash: true # 是否匹配尾部斜杠
              filters:
                - name: RewritePath # 路径重写过滤器
                  args:
                    regexp: /api/product/?(?<segment>.*)
                    replacement: /$\{segment}
                - AddResponseHeader=X-Response-STR, 123
                - OnceToken=X-Response-Token, uuid
              order: 0
            - id: seata-account-route
              uri: lb://seata-account-service
              predicates:
                - name: Path
                  args:
                    pattern: /api/account/**
                    matchTrailingSlash: true # 是否匹配尾部斜杠
              filters:
                - name: RewritePath # 路径重写过滤器
                  args:
                    regexp: /api/account/?(?<segment>.*)
                    replacement: /$\{segment}
                - AddResponseHeader=X-Response-STR, 123
                - OnceToken=X-Response-Token, uuid
              order: 0
            - id: seata-order-route
              uri: lb://seata-order-service
              predicates:
                - name: Path
                  args:
                    pattern: /api/order/**
                    matchTrailingSlash: true
              filters:
                - name: RewritePath
                  args:
                    regexp: /api/order/?(?<segment>.*)
                    replacement: /$\{segment}
                - AddResponseHeader=X-Response-STR, 123
                - OnceToken=X-Response-Token, uuid
              order: 0
            - id: seata-storage-route
              uri: lb://seata-storage-service
              predicates:
                - name: Path
                  args:
                    pattern: /api/storage/**
                    matchTrailingSlash: true # 是否匹配尾部斜杠
              filters:
                - name: RewritePath # 路径重写过滤器
                  args:
                    regexp: /api/storage/?(?<segment>.*)
                    replacement: /$\{segment}
                - AddResponseHeader=X-Response-STR, 123
                - OnceToken=X-Response-Token, uuid
              order: 0
            # Swagger 文档路由
            - id: seata-product-swagger
              uri: lb://seata-product-service
              predicates:
                - Path=/seata-product-service/v3/api-docs/**
              filters:
                - RewritePath=/seata-product-service/(?<segment>.*), /$\{segment}
              order: 1
            - id: seata-account-swagger
              uri: lb://seata-account-service
              predicates:
                - Path=/seata-account-service/v3/api-docs/**
              filters:
                - RewritePath=/seata-account-service/(?<segment>.*), /$\{segment}
              order: 1
            - id: seata-order-swagger
              uri: lb://seata-order-service
              predicates:
                - Path=/seata-order-service/v3/api-docs/**
              filters:
                - RewritePath=/seata-order-service/(?<segment>.*), /$\{segment}
              order: 1
            - id: seata-storage-swagger
              uri: lb://seata-storage-service
              predicates:
                - Path=/seata-storage-service/v3/api-docs/**
              filters:
                - RewritePath=/seata-storage-service/(?<segment>.*), /$\{segment}
              order: 1