spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors: #跨域配置
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: '*'
                allowed-headers: '*'
                allowed-methods: '*'
          default-filters: # 默认过滤器，与global过滤器的区别？
            - AddResponseHeader=X-Response-Default-Red, Default-Blue
          # 在 Spring Cloud Gateway 中，当多个 profile 都定义了 routes 列表时，后加载的 profile 会完全覆盖先加载的 routes 列表，而不是追加,将所有路由合并到一个文件中（推荐）
